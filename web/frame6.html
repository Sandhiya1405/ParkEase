<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkEase</title>
  <link rel="stylesheet" href="Frame5.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="images/node-2.svg" alt="ParkEase Logo">
      <h1>ParkEase</h1>
    </div>
    <div class="icons">
      <button class="user-icon" id="user-btn" aria-label="User Info">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12ZM12 14C8.13401 14 5 16.6863 5 20V21H19V20C19 16.6863 15.866 14 12 14Z" fill="black"/>
        </svg>
      </button>
      <button class="menu-icon" id="menu-btn" aria-label="Menu">&#9776;</button>
      <div class="dropdown" id="dropdown-menu" role="menu" aria-hidden="true">
        <button>Edit Profile</button>
        <button onclick="location.href='privacy.html'">Privacy Policy</button>
        <button onclick="location.href='aboutus.html'">About Us</button>
        <button onclick="location.href='faq.html'">Help & FAQ</button>
        <button id="logout" aria-haspopup="true">Log Out</button>
      </div>
      <div class="overlay" id="overlay" tabindex="-1"></div>
      <div class="user-info-box" id="user-info-box" role="dialog" aria-modal="true" aria-labelledby="user-info-label">
        <label id="user-info-label">User Name</label>
        <input type="text" id="name" readonly>
        <label>Vehicle No</label>
        <input type="text" id="vehicleNo" readonly>
        <label>Driving License No</label>
        <input type="text" id="licenseNo" readonly>
        <label>Phone No</label>
        <input type="text" id="mobile" readonly>
        <button class="close-btn" id="close-btn">Close</button>
      </div>
    </div>
  </header>

  <main>
    <div class="parking-container">
      <div class="left-section">
        <img src="images/car.jpg" alt="Parked Cars" class="parked-car">
      </div>

      <div class="button-container">
        <button class="car-button inactive-btn" onclick="location.href='frame5.html'">CAR</button>
        <button class="bike-button active-btn">BIKE</button>
      </div>

      <div class="right-section">
        <h2>Select Parking (Bike)</h2>

        <div class="date-time-container" style="margin-bottom: 10px; margin-top: 20px;">
          <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <div>
              <label for="fromDate">From Date:</label><br>
              <input type="date" id="fromDate">
            </div>
            <div>
              <label for="toDate">To Date:</label><br>
              <input type="date" id="toDate">
            </div>
            <div>
              <label for="fromTime">From Time:</label><br>
              <input type="time" id="fromTime">
            </div>
            <div>
              <label for="toTime">To Time:</label><br>
              <input type="time" id="toTime">
            </div>
          </div>
        </div>

        <div class="availability-info" id="availabilityInfo">
          <h4>Availability Status</h4>
          <p>Please select date and time to see available slots</p>
        </div>

        <div class="parking-area">
          <div class="column">
            <h3>A</h3>
            <div class="slots">
              <button class="slot">A1</button>
              <button class="slot">A2</button>
              <button class="slot">A3</button>
              <button class="slot">A4</button>
              <button class="slot">A5</button>
              <button class="slot">A6</button>
              <button class="slot">A7</button>
              <button class="slot">A8</button>
            </div>
          </div>
          <div class="column">
            <h3>B</h3>
            <div class="slots">
              <button class="slot">B1</button>
              <button class="slot">B2</button>
              <button class="slot">B3</button>
              <button class="slot">B4</button>
              <button class="slot">B5</button>
              <button class="slot">B6</button>
              <button class="slot">B7</button>
              <button class="slot">B8</button>
            </div>
          </div>
        </div>

        <div class="book-slot-container" style="margin-top: 15px;">
          <button class="book-slot" id="bookBtn" disabled>Book Slot</button>
        </div>

        <div style="height: 90px;"></div>
        <hr>
        <h2 style="text-align: center; margin-top: 20px;">Why you should park with us?</h2>
        <div class="features">
          <div class="feature-button" style="margin-left: 70px;">📹 CCTV</div>
          <div class="feature-button">🔍 Vehicle Inspection</div>
          <div class="feature-button">🚧 Fenced</div>
          <div class="feature-button">🅿 Paved Surface</div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import {getFirestore,collection,doc,getDoc,getDocs,addDoc,setDoc,updateDoc,query,where,onSnapshot} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import {getAuth,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwb9D1YwNilCidcoNCGQXljCcbiGivLIA",
      authDomain: "parkease-9d0a9.firebaseapp.com",
      projectId: "parkease-9d0a9",
      storageBucket: "parkease-9d0a9.appspot.com",
      messagingSenderId: "85004166714",
      appId: "1:85004166714:web:ec328708f50a4997c8b703",
      measurementId: "G-3Z0L3ZYTG5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const analytics = getAnalytics(app);

    let isIntentionalLogout = false;

    const slots = document.querySelectorAll(".slot");
    const bookBtn = document.getElementById("bookBtn");
    const fromDateInput = document.getElementById("fromDate");
    const toDateInput = document.getElementById("toDate");
    const fromTimeInput = document.getElementById("fromTime");
    const toTimeInput = document.getElementById("toTime");
    const availabilityInfoEl = document.getElementById("availabilityInfo");

    let selectedSlot = null;
    let totalSlots = slots.length;
    let bookedSlotsMap = new Map();

    const today = new Date().toISOString().split("T")[0];
    fromDateInput.min = today;
    toDateInput.min = today;

    function formatDateToDisplay(date) {
      const options = {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      };
      return date.toLocaleString('en-US', options);
    }

    function updateBookButtonState() {
      const allInputsFilled = fromDateInput.value && toDateInput.value && 
                             fromTimeInput.value && toTimeInput.value;
      bookBtn.disabled = !(selectedSlot && allInputsFilled);
      bookBtn.classList.toggle("active", selectedSlot && allInputsFilled);
    }

    function updateInitialAvailabilityInfo(bookedCount) {
      const availableCount = totalSlots - bookedCount;
      availabilityInfoEl.innerHTML = `
        <h4>Availability Status</h4>
        <p>Currently Available: <span class="availability-count">${availableCount}</span> out of ${totalSlots}</p>
        <p>Select date and time to check specific availability</p>
      `;
    }

    async function logout() {
      try {
        isIntentionalLogout = true;
        alert("Logged out successfully!");
        await signOut(auth);
        window.location.href = 'Frame2.html';
      } catch (error) {
        console.error("Logout error:", error);
        alert("Failed to logout. Try again.");
        isIntentionalLogout = false;
      }
    }

    async function getUserData(userId) {
      try {
        const userDocRef = doc(db, "Users", userId);
        const userDocSnap = await getDoc(userDocRef);
        if (userDocSnap.exists()) {
          return userDocSnap.data();
        } else {
          console.error("User document does not exist");
          return null;
        }
      } catch (error) {
        console.error("Error fetching user data:", error);
        throw error;
      }
    }

    function isSlotBookedForPeriod(slotId, startTime, endTime) {
      if (!bookedSlotsMap.has(slotId)) {
        return false;
      }

      const slotBookings = bookedSlotsMap.get(slotId);

      for (const booking of slotBookings) {
        if (
          (startTime >= booking.start && startTime < booking.end) ||
          (endTime > booking.start && endTime <= booking.end) ||
          (startTime <= booking.start && endTime >= booking.end)
        ) {
          return true;
        }
      }

      return false;
    }

    async function loadAllBookings() {
      bookedSlotsMap.clear();

      try {
        const bookingsQuerySnapshot = await getDocs(collection(db, "bikeBookings"));

        bookingsQuerySnapshot.forEach((docSnap) => {
          const data = docSnap.data();

          if (data.cancelled === true) {
            return;
          }

          const bookedFrom = data.bookedFrom?.toDate ? data.bookedFrom.toDate() : new Date(data.bookedFrom);
          const bookedTo = data.bookedTo?.toDate ? data.bookedTo.toDate() : new Date(data.bookedTo);

          const slotId = data.slot;
          if (slotId) {
            if (!bookedSlotsMap.has(slotId)) {
              bookedSlotsMap.set(slotId, []);
            }

            bookedSlotsMap.get(slotId).push({
              start: bookedFrom,
              end: bookedTo,
              bookingId: docSnap.id
            });
          }
        });
      } catch (error) {
        console.error("Error loading bookings:", error);
        throw error;
      }
    }

    async function refreshAvailability() {
      const fromDate = fromDateInput.value;
      const toDate = toDateInput.value;
      const fromTime = fromTimeInput.value;
      const toTime = toTimeInput.value;

      if (!fromDate || !toDate || !fromTime || !toTime) {
        availabilityInfoEl.innerHTML = `
          <h4>Availability Status</h4>
          <p>Please select date and time to see available slots</p>
        `;
        return;
      }

      availabilityInfoEl.innerHTML = `
        <h4>Availability Status</h4>
        <p>Checking availability... <span class="loading-indicator"></span></p>
      `;

      try {
        const startDateTime = new Date(`${fromDate}T${fromTime}`);
        const endDateTime = new Date(`${toDate}T${toTime}`);

        if (endDateTime <= startDateTime) {
          availabilityInfoEl.innerHTML = `
            <h4>Availability Status</h4>
            <p>End time must be after start time.</p>
          `;
          return;
        }

        await loadAllBookings();

        let availableCount = 0;

        slots.forEach(slot => {
          const slotId = slot.innerText;
          const isBooked = isSlotBookedForPeriod(slotId, startDateTime, endDateTime);

          if (isBooked) {
            slot.disabled = true;
            slot.classList.add('booked');
          } else {
            slot.disabled = false;
            slot.classList.remove('booked');
            availableCount++;
          }
        });

        availabilityInfoEl.innerHTML = `
          <h4>Availability Status</h4>
          <p>Available Slots: <span class="availability-count">${availableCount}</span> out of ${totalSlots}</p>
          <p>For: ${formatDateToDisplay(startDateTime)} - ${formatDateToDisplay(endDateTime)}</p>
        `;
      } catch (error) {
        console.error("Error checking availability:", error);
        availabilityInfoEl.innerHTML = `
          <h4>Availability Status</h4>
          <p>Error checking availability. Please try again.</p>
        `;
      }
    }

    async function loadBookedSlots() {
      slots.forEach((slot) => {
        slot.disabled = false;
        slot.classList.remove('booked');
      });

      try {
        const slotCollection = collection(db, "bikeSlots");
        const slotQuerySnapshot = await getDocs(slotCollection);

        const bookedSlots = new Set();

        slotQuerySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const slotId = docSnap.id;

          if (data.isBooked === true) {
            bookedSlots.add(slotId);
          }
        });

        const currentTime = new Date();
        const bookingsQuerySnapshot = await getDocs(collection(db, "bikeBookings"));

        bookingsQuerySnapshot.forEach((docSnap) => {
          const data = docSnap.data();

          if (data.cancelled === true) {
            return;
          }

          const bookedFrom = data.bookedFrom?.toDate ? data.bookedFrom.toDate() : new Date(data.bookedFrom);
          const bookedTo = data.bookedTo?.toDate ? data.bookedTo.toDate() : new Date(data.bookedTo);

          if (bookedTo >= currentTime) {
            const slotId = data.slot;
            if (slotId) {
              bookedSlots.add(slotId);
            }
          }
        });

        bookedSlots.forEach(slotId => {
          slots.forEach((slotElement) => {
            if (slotElement.innerText === slotId) {
              slotElement.disabled = true;
              slotElement.classList.add('booked');
            }
          });
        });

        console.log(`Total booked slots: ${bookedSlots.size}`);
        updateInitialAvailabilityInfo(bookedSlots.size);
      } catch (error) {
        console.error("Error loading booked slots:", error);
      }
    }

    function setupRealtimeSlotUpdates() {
      const q = query(collection(db, "bikeBookings"));

      onSnapshot(q, (snapshot) => {
        let needsRefresh = false;

        snapshot.docChanges().forEach((change) => {
          if (change.type === "added" || change.type === "modified" || change.type === "removed") {
            needsRefresh = true;
          }
        });

        if (needsRefresh) {
          if (fromDateInput.value && toDateInput.value && fromTimeInput.value && toTimeInput.value) {
            refreshAvailability();
          } else {
            loadBookedSlots();
          }
        }
      });
    }

    async function checkExpiredBookings() {
      const querySnapshot = await getDocs(collection(db, "bikeBookings"));

      querySnapshot.forEach(async (docSnap) => {
        const data = docSnap.data();
        const bookedTo = data.bookedTo.toDate();
        const currentTime = new Date();

        if (currentTime > bookedTo) {
          const docRef = doc(db, "bikeBookings", docSnap.id);

          await updateDoc(docRef, {
            status: "expired"
          });

          const bookedSlot = data.slot;
          const slotButton = Array.from(slots).find((slot) => slot.innerText === bookedSlot);
          if (slotButton) {
            slotButton.disabled = false;
          }
        }
      });
    }

    document.addEventListener("DOMContentLoaded", async function() {

      document.querySelector(".user-icon").addEventListener("click", function() {
        document.getElementById("user-info-box").style.display = "block";
        document.getElementById("overlay").style.display = "block";
      });

      document.getElementById("close-btn").addEventListener("click", function() {
        document.getElementById("user-info-box").style.display = "none";
        document.getElementById("overlay").style.display = "none";
      });

      document.getElementById("menu-btn").addEventListener("click", function(event) {
        let dropdownMenu = document.getElementById("dropdown-menu");
        dropdownMenu.style.display = dropdownMenu.style.display === "block" ? "none" : "block";
        event.stopPropagation();
      });

      document.addEventListener("click", function(event) {
        let dropdownMenu = document.getElementById("dropdown-menu");
        if (!dropdownMenu.contains(event.target) && event.target.id !== "menu-btn") {
          dropdownMenu.style.display = "none";
        }
      });

      document.getElementById("dropdown-menu").addEventListener("click", function(event) {
        event.stopPropagation();
      });

      document.getElementById('logout').addEventListener('click', logout);

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          try {
            const userData = await getUserData(user.uid);
            if (userData) {
              document.getElementById("name").value = userData.name || "";
              document.getElementById("vehicleNo").value = userData.licenseNo || "";
              document.getElementById("licenseNo").value = userData.vehicleNo || "";
              document.getElementById("mobile").value = userData.mobile || "";
            }
          } catch (error) {
            console.error("Error fetching user data:", error);
            alert("Failed to load user data. Please check console.");
          }
        } else {
          if (!isIntentionalLogout) {
            alert("Please log in to book a slot.");
            window.location.href = 'Frame2.html';
          }
        }
      });

      loadBookedSlots();
      setupRealtimeSlotUpdates();
    });

    slots.forEach((slot) => {
      slot.addEventListener("click", () => {
        if (slot.disabled) return;

        if (selectedSlot && selectedSlot !== slot) {
          selectedSlot.classList.remove("selected");
        }

        if (selectedSlot === slot) {
          selectedSlot.classList.remove("selected");
          selectedSlot = null;
        } else {
          selectedSlot = slot;
          slot.classList.add("selected");
        }

        updateBookButtonState();
      });
    });

    [fromDateInput, toDateInput, fromTimeInput, toTimeInput].forEach((input) => {
      input.addEventListener("change", () => {
        updateBookButtonState();
        refreshAvailability();
      });
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const userId = user.uid;

        bookBtn.addEventListener("click", async () => {
          if (!selectedSlot) return;

          const fromDate = fromDateInput.value;
          const toDate = toDateInput.value;
          const fromTime = fromTimeInput.value;
          const toTime = toTimeInput.value;

          const bookedFrom = new Date(`${fromDate}T${fromTime}`);
          const bookedTo = new Date(`${toDate}T${toTime}`);

          if (bookedTo <= bookedFrom) {
            alert("To date/time must be after From date/time.");
            return;
          }

          const durationInMinutes = (bookedTo - bookedFrom) / (1000 * 60);
          if (durationInMinutes < 60) {
            alert("Booking duration must be at least 60 minutes.");
            return;
          }

          const slotId = selectedSlot.innerText;

          if (isSlotBookedForPeriod(slotId, bookedFrom, bookedTo)) {
            alert("This slot is no longer available for the selected time period. Please select another slot.");
            refreshAvailability();
            return;
          }

          const userDocRef = doc(db, "Users", userId);
          const userDocSnap = await getDoc(userDocRef);

          if (!userDocSnap.exists()) {
            alert("User data not found. Please complete your profile.");
            return;
          }

          const userData = userDocSnap.data();
          const requiredFields = ["name", "email", "mobile", "licenseNo", "vehicleNo"];
          const missingFields = requiredFields.filter((field) => !userData[field]);

          if (missingFields.length > 0) {
            alert("Please update your profile with all details.");
            return;
          }

          await addDoc(collection(db, "bikeBookings"), {
            slot: slotId,
            vehicleType: "bike",
            bookedAt: new Date(),
            bookedFrom: bookedFrom,
            bookedTo: bookedTo,
            userId: userId,
            name: userData.name,
            email: userData.email,
            mobile: userData.mobile,
            licenseNo: userData.licenseNo,
            vehicleNo: userData.vehicleNo
          });

          selectedSlot.disabled = true;
          selectedSlot.classList.remove("selected");
          selectedSlot = null;
          bookBtn.disabled = true;
          bookBtn.classList.remove("active");

          fromDateInput.value = '';
          toDateInput.value = '';
          fromTimeInput.value = '';
          toTimeInput.value = '';

          alert(`Slot ${slotId} booked successfully!`);
          window.location.href = "payment.html";
        });
      } else {
        if (!isIntentionalLogout) {
          alert("Please log in to book a slot.");
          window.location.href = 'Frame2.html';
        }
      }
    });

    setInterval(checkExpiredBookings, 60000);
  </script>
</body>
</html>
