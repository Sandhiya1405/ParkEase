<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkEase</title>
  <link rel="stylesheet" href="Frame3.css" />
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwb9D1YwNilCidcoNCGQXljCcbiGivLIA",
      authDomain: "parkease-9d0a9.firebaseapp.com",
      projectId: "parkease-9d0a9",
      storageBucket: "parkease-9d0a9.firebasestorage.app",
      messagingSenderId: "85004166714",
      appId: "1:85004166714:web:ec328708f50a4997c8b703",
      measurementId: "G-3Z0L3ZYTG5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const analytics = getAnalytics(app);

    let currentUserId = null;
    let currentNotifications = [];

    async function logout() {
      try {
        await signOut(auth);
        alert("Logged out successfully!");
        window.location.href = 'Frame2.html';
      } catch (error) {
        console.error("Logout error:", error);
        alert("Failed to logout. Try again.");
      }
    }

    async function getUserData(userId) {
      try {
        const userDocRef = doc(db, "Users", userId);
        const userDocSnap = await getDoc(userDocRef);
        if (userDocSnap.exists()) {
          return userDocSnap.data();
        } else {
          console.error("User document does not exist");
          return null;
        }
      } catch (error) {
        console.error("Error fetching user data:", error);
        throw error;
      }
    }

    async function loadNotifications() {
      if (!currentUserId) return;

      const q = query(
        collection(db, "ParkingRequests"),
        where("requestedUserId", "==", currentUserId),
        where("status", "==", "pending")
      );

      onSnapshot(q, (querySnapshot) => {
        currentNotifications = [];
        querySnapshot.forEach((doc) => {
          currentNotifications.push({ id: doc.id, ...doc.data() });
        });

        updateNotificationBadge(currentNotifications.length);
      });
    }

    function updateNotificationBadge(count) {
      const badge = document.getElementById('notification-count');
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }

    function openNotificationModal() {
      displayNotifications();
      document.getElementById('notification-overlay').style.display = 'block';
    }

    function closeNotificationModal() {
      document.getElementById('notification-overlay').style.display = 'none';
    }

    async function denyRequest(requestId) {
      try {
        await deleteDoc(doc(db, 'ParkingRequests', requestId));
        alert('Request denied and removed.');
      } catch (error) {
        console.error('Error denying request:', error);
        alert('Failed to deny request: ' + error.message);
      }
    }

    function displayNotifications() {
      const notificationBody = document.getElementById('notification-body');

      if (currentNotifications.length === 0) {
        notificationBody.innerHTML = `
          <div class="no-notifications">
            No new parking requests
          </div>
        `;
        return;
      }

      notificationBody.innerHTML = currentNotifications.map(notification => `
        <div class="notification-item">
          <div class="notification-title">Parking Slot Request</div>
          <div class="notification-details">
            <strong>From:</strong> ${notification.requesterName}<br>
            <strong>Email:</strong> ${
              notification.requesterEmail
                ? `<a href="https://mail.google.com/mail/u/0/?view=cm&fs=1&to=${encodeURIComponent(notification.requesterEmail)}" target="_blank" rel="noopener noreferrer">${notification.requesterEmail}</a>`
                : 'Unknown'
            }<br>
            <strong>Vehicle Type:</strong> ${notification.vehicleType || 'Unknown'}<br>
            <strong>Date:</strong> ${notification.fromDate} ${notification.fromTime} - ${notification.toDate} ${notification.toTime}
          </div>
          <button class="deny-btn" onclick="denyRequest('${notification.id}')">Deny</button>
        </div>
      `).join('');
    }

    window.openNotificationModal = openNotificationModal;
    window.closeNotificationModal = closeNotificationModal;
    window.denyRequest = denyRequest;

    document.addEventListener("DOMContentLoaded", async function () {
      document.querySelector(".user-icon").addEventListener("click", function () {
        document.getElementById("user-info-box").style.display = "block";
        document.getElementById("overlay").style.display = "block";
      });

      document.getElementById("close-btn").addEventListener("click", function () {
        document.getElementById("user-info-box").style.display = "none";
        document.getElementById("overlay").style.display = "none";
      });

      document.getElementById("menu-btn").addEventListener("click", function (event) {
        let dropdownMenu = document.getElementById("dropdown-menu");
        dropdownMenu.style.display = dropdownMenu.style.display === "block" ? "none" : "block";
        event.stopPropagation();
      });

      document.addEventListener("click", function (event) {
        let dropdownMenu = document.getElementById("dropdown-menu");
        if (!dropdownMenu.contains(event.target) && event.target.id !== "menu-btn") {
          dropdownMenu.style.display = "none";
        }

        if (event.target.id === "notification-overlay") {
          closeNotificationModal();
        }
      });

      document.getElementById("dropdown-menu").addEventListener("click", function (event) {
        event.stopPropagation();
      });

      document.getElementById("notification-btn").addEventListener("click", function (event) {
        event.stopPropagation();
        openNotificationModal();
      });

      document.getElementById("notification-close").addEventListener("click", closeNotificationModal);

      document.getElementById('logout').addEventListener('click', logout);

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentUserId = user.uid;
          try {
            const userData = await getUserData(user.uid);
            if (userData) {
              document.getElementById("name").value = userData.name || "";
              document.getElementById("vehicleNo").value = userData.licenseNo || "";
              document.getElementById("licenseNo").value = userData.vehicleNo || "";
              document.getElementById("mobile").value = userData.mobile || "";
            }
            await loadNotifications();
          } catch (error) {
            console.error("Error fetching user data:", error);
            alert("Failed to load user data. Please check console.");
          }
        } else {
          window.location.href = 'Frame2.html';
        }
      });
    });
  </script>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="images/node-2.svg" alt="ParkEase Logo" class="logo">
      <h1>PARK EASE</h1>
    </div>
    <div class="icons">
      <button class="user-icon" id="user-btn" aria-label="User Info">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12ZM12 14C8.13401 14 5 16.6863 5 20V21H19V20C19 16.6863 15.866 14 12 14Z" fill="black"/>
        </svg>
      </button>
      <button class="notification-icon" id="notification-btn" aria-label="Notifications">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path d="M12 24c1.1 0 2-.9 2-2H10c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V6a1.5 1.5 0 0 0-3 0v.68C7.63 7.36 6 9.92 6 13v5l-2 2v1h16v-1l-2-2z" fill="black"/>
        </svg>
        <span id="notification-count" class="badge" style="display: none;">0</span>
      </button>
      <button class="menu-icon" id="menu-btn" aria-label="Menu">☰</button>
      <div class="dropdown" id="dropdown-menu" role="menu" aria-hidden="true">
        <button onclick="location.href='edit.html'">Edit Profile</button>
        <button onclick="location.href='privacy.html'">Privacy Policy</button>
        <button onclick="location.href='aboutus.html'">About Us</button>
        <button onclick="location.href='faq.html'">Help & FAQ</button>
        <button id="logout" aria-haspopup="true">Log Out</button>
      </div>
      <div class="overlay" id="overlay" tabindex="-1"></div>
      <div class="user-info-box" id="user-info-box" role="dialog" aria-modal="true" aria-labelledby="user-info-label">
        <label id="user-info-label">User Name</label><input type="text" id="name" readonly />
        <label>Vehicle No</label><input type="text" id="vehicleNo" readonly />
        <label>Driving License No</label><input type="text" id="licenseNo" readonly />
        <label>Phone No</label><input type="text" id="mobile" readonly />
        <button class="close-btn" id="close-btn">Close</button>
      </div>
    </div>
  </header>

  <div class="notification-overlay" id="notification-overlay">
    <div class="notification-modal">
      <div class="notification-header">
        <h3>Parking Requests</h3>
        <button class="notification-close" id="notification-close">×</button>
      </div>
      <div class="notification-body" id="notification-body">
      </div>
    </div>
  </div>

  <div class="frame">
    <div class="parking-container">
      <img src="images/car.jpg" alt="Parking Lot">
      <div class="menu-box">
        <button onclick="location.href='frame5.html'">🚲 Slot Booking</button>
        <button onclick="location.href='Frame7.html'">🔍 Search User</button>
        <button onclick="location.href='Frame8.html'">📜 Booking History</button>
        <button onclick="location.href='Frame4.html'">👥 Friends List</button>
      </div>
    </div>
    <h2>Why you should park with us?</h2>
    <div class="features">
      <div class="feature-button">📹 CCTV</div>
      <div class="feature-button">🔍 Vehicle Inspection</div>
      <div class="feature-button">🚧 Fenced</div>
      <div class="feature-button">🅿️ Paved Surface</div>
    </div>
    <hr>
    <main>
    <h2>Contact Us</h2>
    <section>
      <p><strong>Phone:</strong> +1-800-555-1234</p>
      <p><strong>Email:</strong> support@parkease.com</p>
      <p><strong>Address:</strong> 123 Park Avenue, Suite 100, New York, NY 10001</p>
    </section>
  </main>
  </div>
</body>
</html>
